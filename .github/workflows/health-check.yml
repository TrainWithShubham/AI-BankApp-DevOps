name: Health Check workflow

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest app image
        run: docker pull sana2026/ai-bankapp-devops:latest

      - name: Create Docker network
        run: docker network create my-network

      # ---------------------------
      # MySQL Container
      # ---------------------------
      - name: Run MySQL container
        run: |
          docker run -d \
            --name mysql-container \
            --network my-network \
            -e MYSQL_ROOT_PASSWORD=root123 \
            -e MYSQL_DATABASE=bankappdb \
            mysql:8.0

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in {1..12}; do
            if docker exec mysql-container mysqladmin ping -h "localhost" --silent; then
              echo "✅ MySQL is ready"
              exit 0
            fi
            echo "⏳ Waiting for MySQL..."
            sleep 5
          done
          echo "❌ MySQL failed to start"
          docker logs mysql-container
          exit 1

      # ---------------------------
      # App Container
      # ---------------------------
      - name: Run app container
        run: |
          docker run -d \
            --name health-check-container \
            --network my-network \
            -p 8080:8080 \
            -e MYSQL_HOST=mysql-container \
            -e MYSQL_PORT=3306 \
            -e MYSQL_DATABASE=bankappdb \
            -e MYSQL_USER=root \
            -e MYSQL_PASSWORD=root123 \
            sana2026/ai-bankapp-devops:latest

      - name: Wait for app to start
        run: sleep 20

      # ---------------------------
      # Health Check
      # ---------------------------
      - name: Curl the health endpoint
        run: |
          URL="http://localhost:8080/actuator/health"

          for i in {1..12}; do
            echo "Attempt $i..."

            response=$(curl -s -o /dev/null -w "%{http_code}" $URL || echo "000")

            if [ "$response" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi

            echo "⏳ Waiting... (status: $response)"
            sleep 5
          done

          echo "❌ Health check failed"
          docker ps -a
          docker logs health-check-container || true
          docker logs mysql-container || true
          exit 1

      # ---------------------------
      # Cleanup
      # ---------------------------
      - name: Cleanup containers
        if: always()
        run: |
          docker stop health-check-container mysql-container || true
          docker rm health-check-container mysql-container || true
          docker network rm my-network || true

      # ---------------------------
      # Summary
      # ---------------------------
      - name: Write GitHub Step Summary
        if: success()
        run: |
          echo "## ✅ Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: sana2026/ai-bankapp-devops:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY

