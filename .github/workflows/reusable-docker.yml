name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string

      tag:
        required: true
        type: string

    secrets:
      docker_username:
        required: true

      docker_token:
        required: true

    outputs:
      image_url:
        description: "Docker Image URL"
        value: ${{ jobs.docker.outputs.image_url }}

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.image.outputs.url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ inputs.image_name }}:${{ inputs.tag }} .

      - name: Push Docker Image
        run: |
          docker push ${{ inputs.image_name }}:${{ inputs.tag }}

      - name: Set Image URL
        id: image
        run: |
          echo "url=${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
