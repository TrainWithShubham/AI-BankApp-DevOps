name: Reusable Docker Workflow
on:
  workflow_call:
    inputs:
      image-name:
        description: 'The name of the Docker image to build'
        required: true
        type: string
      image-tag:
        description: 'The tag of the built Docker image'
        required: false
        type: string
        default: 'latest'
   
    secrets:
      
      DOCKER_USERNAME:
        description: 'DockerHub username'
        required: true
      DOCKER_TOKEN:
        description: 'DockerHub access token'
        required: true

    outputs:
      image_url:
        description: 'The URL of the built Docker image'
        value: ${{ jobs.DockerBuild.outputs.image_url }}

jobs:
  DockerBuild:
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.build.outputs.image_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker image
        id: build
        run: |
          docker build \
            -t ${{ inputs.image-name }}:latest \
            -t ${{ inputs.image-name }}:${{ inputs.image-tag }} .

          docker push ${{ inputs.image-name }}:latest
          docker push ${{ inputs.image-name }}:${{ inputs.image-tag }}

          echo "image_url=${{ inputs.image-name }}:${{ inputs.image-tag }}" >> $GITHUB_OUTPUT


          # 🔐 Trivy Scan Step (DevSecOps)
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ inputs.image-tag }}
          format: 'table'
          output: 'trivy-report.txt'
          severity: 'CRITICAL'
          exit-code: '1'

      # 📄 Upload Scan Report
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
