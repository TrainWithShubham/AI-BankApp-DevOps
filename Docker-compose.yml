services:
  mysql:
    image: mysql:8.0
    container_name: bankapp-mysql
    environment:
        MYSQL_ROOT_PASSWORD: Test@123
        MYSQL_DATABASE: bankappdb
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql 
    networks:
      - bankapp-nw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10


  bankapp:
    build: .
    container_name: bankapp
    ports:
    - "8081:8080"
    networks:
    - bankapp-nw
    environment:
      MYSQL_HOST: bankapp-mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bankappdb
      MYSQL_USER: root
      MYSQL_PASSWORD: Test@123
    depends_on:
      mysql:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    networks:
      - bankapp-nw
    volumes:
    - ollama-data:/root/.ollama
  


networks:
  bankapp-nw:
    driver: bridge

volumes:
  mysql-data:
  ollama-data: