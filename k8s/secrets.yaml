# `apiVersion` yeh batata hai ki Secret core v1 API object hai.
apiVersion: v1
# `kind` define karta hai ki yeh Secret resource create hoga.
kind: Secret
# `metadata` me secret ka naam aur namespace diya jata hai.
metadata:
  # `name` secret ka reference name hai jo deployments me use hota hai.
  name: bankapp-secret
  # `namespace` secret ko bankapp scope tak limit karta hai.
  namespace: bankapp
# `type: Opaque` generic key-value secret ke liye common type hai.
type: Opaque
# `data` me values base64-encoded form me store hoti hain.
data:
  # MySQL root password ka base64 value; prod me strong secret manager use karein.
  MYSQL_ROOT_PASSWORD: cm9vdA==
  # App/user level password ka base64 value; alag credentials use-case ke liye.
  MYSQL_PASSWORD: VGVzdEAxMjM=