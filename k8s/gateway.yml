# Requires: Gateway API CRDs + Envoy Gateway installed on the cluster
# On EKS, Envoy Gateway creates an AWS NLB for external access automatically.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: bankapp-gateway
  namespace: bankapp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: envoy-gateway
  listeners:
    # HTTP listener
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener (requires TLS secret / cert-manager)
    - name: https
      protocol: HTTPS
      port: 443
      hostname: 32.193.145.173.nip.io
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: bankapp-tls
      allowedRoutes:
        namespaces:
          from: Same

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bankapp-route
  namespace: bankapp
spec:
  hostnames:
    - 32.193.145.173.nip.io
  parentRefs:
    # HTTPS listener reference
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: bankapp-gateway
      sectionName: https

    # HTTP listener reference
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: bankapp-gateway
      sectionName: http

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: bankapp-service
          port: 8080
          weight: 1

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: bankapp-session
  namespace: bankapp
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: bankapp-route
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Cookie
      cookie:
        name: BANKAPP_AFFINITY
        ttl: 3600s
  timeout:
    http:
      requestTimeout: 120s