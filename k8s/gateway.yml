# Requires: Gateway API CRDs + Envoy Gateway installed on the cluster
# On EKS, Envoy Gateway creates an AWS NLB for external access automatically.

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: bankapp-gateway
  namespace: bankapp
  # COMMENTED: cert-manager annotation (not using cert-manager)
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: envoy-gateway
  listeners:
    # Keep HTTP listener
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # COMMENTED: HTTPS listener (requires TLS secret / cert-manager)
    # - name: https
    #   protocol: HTTPS
    #   port: 443
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - group: ""
    #         kind: Secret
    #         name: bankapp-tls
    #   allowedRoutes:
    #     namespaces:
    #       from: Same

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bankapp-route
  namespace: bankapp
spec:
  # hostnames:
  #   - 100.55.230.89.nip.io

  parentRefs:
    # COMMENTED: HTTPS listener reference
    # - group: gateway.networking.k8s.io
    #   kind: Gateway
    #   name: bankapp-gateway
    #   sectionName: https

    # Keep HTTP
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: bankapp-gateway
      sectionName: http

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: bankapp-service
          port: 8080
          weight: 1

---
# Keep this (no TLS dependency)
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: bankapp-session
  namespace: bankapp
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: bankapp-route
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Cookie
      cookie:
        name: BANKAPP_AFFINITY
        ttl: 3600s
  timeout:
    http:
      requestTimeout: 120s