# `apiVersion` batata hai ki Service core v1 API ka object hai.
apiVersion: v1
# `kind` resource type ko Service declare karta hai.
kind: Service
# `metadata` service ka naam aur namespace details hold karta hai.
metadata:
  # `name` internal DNS banata hai (`mysql-service.bankapp.svc`) jisse app DB tak pahuche.
  name: mysql-service
  # `namespace` service ko bankapp workloads ke saath group karta hai.
  namespace: bankapp
# `spec` network routing rules define karta hai.
spec:
  # `ClusterIP` service ko cluster ke andar private endpoint banata hai.
  type: ClusterIP
  # `selector` se woh pods choose hote hain jinke paas matching label ho.
  selector:
    # `app: mysql` label wale pods ko service backend banaya jayega.
    app: mysql
  # `ports` traffic forwarding ke source aur destination ports define karta hai.
  ports:
    # Service port jahan se dusre pods MySQL connect karenge.
    - port: 3306
      # Pod/container ke actual port tak request forward hoti hai.
      targetPort: 3306

---

apiVersion: v1
kind: Service
metadata:
  name: bankapp-service
  namespace: bankapp
spec:
  type: NodePort
  selector:
    app: bankapp
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080

---

apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: bankapp
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
