spring.application.name=bankapp

# MySQL Database configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:bankappdb}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Test@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Virtual threads (Java 21)
spring.threads.virtual.enabled=true

# Actuator - Only expose safe health endpoint (restricted from info,metrics,prometheus after SAST finding)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Gemini AI
ai.timeout.connect-ms=${AI_TIMEOUT_CONNECT_MS:3000}
ai.timeout.read-ms=${AI_TIMEOUT_READ_MS:30000}

gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
gemini.model=${GEMINI_MODEL:gemini-3-flash-preview}
gemini.api.key=${GEMINI_API_KEY:}
gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:512}

# Structured logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
