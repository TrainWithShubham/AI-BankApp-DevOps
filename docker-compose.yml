services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: test@123
      MYSQL_DATABASE: bankappdb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest@123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bankapp-nw

  bankapp:
    build: .
    container_name: bankapp
    ports: 
    - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bankappdb
      MYSQL_USER: root
      MYSQL_PASSWORD: test@123
    depends_on:
      mysql: 
        condition: service_healthy

    networks:
      - bankapp-nw

networks:
  bankapp-nw:
    driver: bridge

volumes:
  mysql-data:
